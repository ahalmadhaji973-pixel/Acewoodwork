<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Woodwork - Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --dark: #1c1410;
            --mid: #2b1e16;
            --light: #8b5e3c;
            --gold: #c9a24d;
            --bg: #1c1410;
            --card: #2a1d16;
            --text: #f5f1ed;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        
        body.rtl { direction: rtl; text-align: right; }
        [lang="ar"] { display: none; }
        body.rtl [lang="ar"] { display: inline-block; }
        body.rtl [lang="en"] { display: none; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, var(--mid), var(--dark));
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(201, 162, 77, 0.1);
        }
        
        .header h1 {
            font-size: 2rem;
            color: var(--gold);
        }
        
        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--light), var(--gold));
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 162, 77, 0.4);
        }
        
        .btn-danger {
            background: #d32f2f;
            color: #fff;
        }
        
        .btn-danger:hover {
            background: #b71c1c;
        }
        
        .btn-secondary {
            background: var(--mid);
            color: var(--gold);
            border: 1px solid var(--gold);
        }
        
        .btn-secondary:hover {
            background: var(--light);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(201, 162, 77, 0.2);
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }
        
        .tab-btn.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(201, 162, 77, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(201, 162, 77, 0.2);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .image-preview {
            margin-top: 15px;
            text-align: center;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            border: 1px solid rgba(201, 162, 77, 0.2);
        }
        
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }
        
        .file-input-label {
            display: block;
            padding: 12px;
            background: rgba(201, 162, 77, 0.2);
            border: 2px dashed var(--gold);
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .file-input-label:hover {
            background: rgba(201, 162, 77, 0.3);
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--gold);
        }
        
        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .gallery-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(201, 162, 77, 0.1);
            transition: 0.3s;
        }
        
        .gallery-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .gallery-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .gallery-card-content {
            padding: 15px;
        }
        
        .gallery-card h3 {
            color: var(--gold);
            margin-bottom: 8px;
            font-size: 1rem;
        }
        
        .gallery-card p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 12px;
        }
        
        .gallery-card-actions {
            display: flex;
            gap: 10px;
        }
        
        .gallery-card-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .edit-btn {
            background: var(--light);
            color: #fff;
        }
        
        .delete-btn {
            background: #d32f2f;
            color: #fff;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card);
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(201, 162, 77, 0.2);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: var(--gold);
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        /* Alert */
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        
        .alert-error {
            background: rgba(211, 47, 47, 0.2);
            color: #d32f2f;
            border: 1px solid #d32f2f;
        }
        
        .alert-warning {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }
        
        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 162, 77, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div>
            <h1><span lang="en">Admin Dashboard</span><span lang="ar">لوحة التحكم</span></h1>
        </div>
        <div class="header-controls">
            <button class="btn btn-secondary" id="langToggle">
                <span lang="en">العربية</span><span lang="ar">English</span>
            </button>
            <button class="btn btn-danger" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span lang="en">Logout</span><span lang="ar">تسجيل الخروج</span>
            </button>
        </div>
    </div>
    
    <!-- Alert Messages -->
    <div id="alertBox" class="alert"></div>
    
    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gallery')">
            <i class="fas fa-images"></i>
            <span lang="en">Gallery</span><span lang="ar">المعرض</span>
        </button>
        <button class="tab-btn" onclick="switchTab('services')">
            <i class="fas fa-briefcase"></i>
            <span lang="en">Services</span><span lang="ar">الخدمات</span>
        </button>
    </div>
    
    <!-- Gallery Tab -->
    <div id="gallery" class="tab-content active">
        <button class="btn btn-primary" onclick="openAddModal('gallery')">
            <i class="fas fa-plus"></i>
            <span lang="en">Add New Project</span><span lang="ar">إضافة مشروع جديد</span>
        </button>
        
        <div id="galleryLoading" class="loading">
            <div class="spinner"></div>
            <p><span lang="en">Loading...</span><span lang="ar">جاري التحميل...</span></p>
        </div>
        
        <div id="galleryGrid" class="gallery-grid"></div>
    </div>
    
    <!-- Services Tab -->
    <div id="services" class="tab-content">
        <button class="btn btn-primary" onclick="openAddModal('services')">
            <i class="fas fa-plus"></i>
            <span lang="en">Add New Service</span><span lang="ar">إضافة خدمة جديدة</span>
        </button>
        
        <div id="servicesLoading" class="loading">
            <div class="spinner"></div>
            <p><span lang="en">Loading...</span><span lang="ar">جاري التحميل...</span></p>
        </div>
        
        <div id="servicesGrid" class="gallery-grid"></div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="itemModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"><span lang="en">Add New Item</span><span lang="ar">إضافة عنصر جديد</span></h2>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        
        <form id="itemForm">
            <div class="form-group">
                <label><span lang="en">Upload Image</span><span lang="ar">رفع صورة</span></label>
                <div class="file-input-wrapper">
                    <input type="file" id="imageFile" accept="image/*" onchange="handleImageUpload(event)">
                    <label for="imageFile" class="file-input-label">
                        <i class="fas fa-cloud-upload-alt"></i><br>
                        <span lang="en">Click to upload or drag & drop</span><span lang="ar">اضغط للرفع أو اسحب الملف</span>
                    </label>
                </div>
                <div class="file-name" id="fileName"></div>
                <div class="image-preview">
                    <img id="previewImg" style="display: none;">
                </div>
            </div>
            
            <input type="hidden" id="imageUrl">
            
            <div class="form-row">
                <div class="form-group">
                    <label><span lang="en">Title (English)</span><span lang="ar">العنوان (إنجليزي)</span></label>
                    <input type="text" id="titleEn" required>
                </div>
                <div class="form-group">
                    <label><span lang="en">Title (Arabic)</span><span lang="ar">العنوان (عربي)</span></label>
                    <input type="text" id="titleAr" required>
                </div>
            </div>
            
            <div id="categoryGroup" class="form-group" style="display: none;">
                <label><span lang="en">Category</span><span lang="ar">الفئة</span></label>
                <select id="category">
                    <option value="carpentry"><span lang="en">Carpentry</span><span lang="ar">النجارة</span></option>
                    <option value="kitchen"><span lang="en">Kitchen</span><span lang="ar">المطابخ</span></option>
                    <option value="cafe"><span lang="en">Cafe Shops</span><span lang="ar">الكافيهات</span></option>
                    <option value="painting"><span lang="en">Painting</span><span lang="ar">الطلاء</span></option>
                    <option value="decor"><span lang="en">Decor</span><span lang="ar">الديكور</span></option>
                </select>
            </div>
            
            <div class="form-group">
                <label><span lang="en">Description</span><span lang="ar">الوصف</span></label>
                <textarea id="description" rows="4"></textarea>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">
                    <span lang="en">Save</span><span lang="ar">حفظ</span>
                </button>
                <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex: 1;">
                    <span lang="en">Cancel</span><span lang="ar">إلغاء</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    // Configuration
    const GITHUB_USER = 'ahalmadhaji973-pixel';
    const REPO_NAME = 'Acewoodwork';
    const GITHUB_TOKEN = localStorage.getItem('github_token');
    
    let currentTab = 'gallery';
    let currentEditingFile = null;
    let uploadedImageBase64 = null;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        checkAdminSession();
        checkAuth();
        loadContent('gallery');
        
        // Language toggle
        document.getElementById('langToggle').addEventListener('click', toggleLanguage);
        
        // Form submit
        document.getElementById('itemForm').addEventListener('submit', handleFormSubmit);
        
        // Drag and drop
        const fileInput = document.getElementById('imageFile');
        const fileLabel = document.querySelector('.file-input-label');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            fileLabel.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        fileLabel.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            fileInput.files = files;
            handleImageUpload({ target: fileInput });
        });
    });
    
    function checkAdminSession() {
        const sessionToken = localStorage.getItem('admin_session');
        const sessionTime = localStorage.getItem('admin_session_time');
        const SESSION_TIMEOUT = 24 * 60 * 60 * 1000;
        
        if (!sessionToken || !sessionTime) {
            window.location.href = 'login.html';
            return;
        }
        
        const elapsed = Date.now() - parseInt(sessionTime);
        if (elapsed > SESSION_TIMEOUT) {
            localStorage.removeItem('admin_session');
            localStorage.removeItem('admin_session_time');
            window.location.href = 'login.html';
            return;
        }
    }
    
    function checkAuth() {
        if (!GITHUB_TOKEN) {
            const token = prompt('Enter your GitHub Personal Access Token:\n(Create one at https://github.com/settings/tokens with "repo" scope)');
            if (!token) {
                alert('GitHub token is required!');
                window.location.href = '../index.html';
                return;
            }
            localStorage.setItem('github_token', token);
            location.reload();
        }
    }
    
    function toggleLanguage() {
        document.body.classList.toggle('rtl');
        localStorage.setItem('lang', document.body.classList.contains('rtl') ? 'ar' : 'en');
    }
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        event.target.closest('.tab-btn').classList.add('active');
        loadContent(tab);
    }
    
    async function loadContent(type) {
        const gridId = type === 'gallery' ? 'galleryGrid' : 'servicesGrid';
        const loadingId = type === 'gallery' ? 'galleryLoading' : 'servicesLoading';
        const grid = document.getElementById(gridId);
        const loading = document.getElementById(loadingId);
        
        loading.classList.add('show');
        grid.innerHTML = '';
        
        try {
            const path = type === 'gallery' ? 'content/gallery' : 'content/services';
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}`,
                {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+raw'
                    }
                }
            );
            
            if (!response.ok) throw new Error('Failed to load content');
            
            const files = await response.json();
            const mdFiles = files.filter(f => f.name.endsWith('.md'));
            
            for (const file of mdFiles) {
                const contentResponse = await fetch(file.download_url);
                const content = await contentResponse.text();
                const data = parseMarkdown(content);
                
                const card = createCard(data, file.name, type);
                grid.appendChild(card);
            }
            
            if (mdFiles.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">
                    <span lang="en">No items yet. Add your first one!</span>
                    <span lang="ar">لا توجد عناصر حتى الآن. أضف أول عنصر!</span>
                </p>`;
            }
        } catch (error) {
            showAlert('Error loading content: ' + error.message, 'error');
        } finally {
            loading.classList.remove('show');
        }
    }
    
    function parseMarkdown(content) {
        const frontmatter = content.split('---')[1];
        const data = {};
        
        frontmatter.split('\n').forEach(line => {
            const [key, ...value] = line.split(':');
            if (key && value.length) {
                data[key.trim()] = value.join(':').trim().replace(/["']/g, '');
            }
        });
        
        return data;
    }
    
    function createCard(data, filename, type) {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        
        const title = type === 'gallery' ? (data.g_title_en || data.title || 'Untitled') : (data.title || 'Untitled');
        const titleAr = type === 'gallery' ? (data.g_title_ar || '') : (data.title_ar || '');
        
        card.innerHTML = `
            <img src="${data.image || 'https://via.placeholder.com/250x200'}" alt="${title}" onerror="this.src='https://via.placeholder.com/250x200'">
            <div class="gallery-card-content">
                <h3>${title}</h3>
                <p>${titleAr}</p>
                <p style="font-size: 0.8rem; opacity: 0.6;">${filename}</p>
                <div class="gallery-card-actions">
                    <button class="delete-btn" onclick="deleteItem('${filename}', '${type}')">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>
        `;
        
        return card;
    }
    
    function openAddModal(type) {
        currentTab = type;
        currentEditingFile = null;
        uploadedImageBase64 = null;
        document.getElementById('categoryGroup').style.display = type === 'services' ? 'block' : 'none';
        document.getElementById('itemForm').reset();
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('fileName').textContent = '';
        document.getElementById('itemModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('itemModal').classList.remove('active');
        currentEditingFile = null;
        uploadedImageBase64 = null;
    }
    
    function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedImageBase64 = e.target.result;
            const preview = document.getElementById('previewImg');
            preview.src = uploadedImageBase64;
            preview.style.display = 'block';
            document.getElementById('fileName').textContent = file.name;
        };
        reader.readAsDataURL(file);
    }
    
    async function handleFormSubmit(e) {
        e.preventDefault();
        
        if (!uploadedImageBase64) {
            showAlert('Please upload an image first!', 'error');
            return;
        }
        
        const titleEn = document.getElementById('titleEn').value;
        const titleAr = document.getElementById('titleAr').value;
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value;
        
        try {
            showAlert('Uploading image...', 'warning');
            
            // Upload image to assets/images
            const imageFileName = `${Date.now()}.png`;
            const imagePath = `assets/images/${imageFileName}`;
            
            const imageBase64 = uploadedImageBase64.split(',')[1];
            
            const imageUploadResponse = await fetch(
                `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${imagePath}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload image: ${imageFileName}`,
                        content: imageBase64
                    })
                }
            );
            
            if (!imageUploadResponse.ok) throw new Error('Failed to upload image');
            
            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${imagePath}`;
            
            // Create markdown file
            const frontmatter = currentTab === 'gallery'
                ? `---\nimage: ${imageUrl}\ng_title_en: ${titleEn}\ng_title_ar: ${titleAr}\n---\n\n${description}`
                : `---\nimage: ${imageUrl}\ntitle: ${titleEn}\ntitle_ar: ${titleAr}\ncategory: ${category}\n---\n\n${description}`;
            
            const filename = `${Date.now()}.md`;
            const path = currentTab === 'gallery' ? 'content/gallery' : 'content/services';
            
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}/${filename}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Add new ${currentTab} item: ${titleEn}`,
                        content: btoa(frontmatter)
                    })
                }
            );
            
            if (!response.ok) throw new Error('Failed to save item');
            
            showAlert(`${currentTab === 'gallery' ? 'Project' : 'Service'} added successfully!`, 'success');
            closeModal();
            loadContent(currentTab);
        } catch (error) {
            showAlert('Error saving item: ' + error.message, 'error');
        }
    }
    
    async function deleteItem(filename, type) {
        if (!confirm('Are you sure you want to delete this item?')) return;
        
        try {
            const path = type === 'gallery' ? 'content/gallery' : 'content/services';
            
            // First, get the file to get its SHA
            const getResponse = await fetch(
                `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}/${filename}`,
                {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`
                    }
                }
            );
            
            const fileData = await getResponse.json();
            
            // Then delete it
            const deleteResponse = await fetch(
                `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${path}/${filename}`,
                {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Delete ${type} item: ${filename}`,
                        sha: fileData.sha
                    })
                }
            );
            
            if (!deleteResponse.ok) throw new Error('Failed to delete item');
            
            showAlert('Item deleted successfully!', 'success');
            loadContent(type);
        } catch (error) {
            showAlert('Error deleting item: ' + error.message, 'error');
        }
    }
    
    function showAlert(message, type) {
        const alertBox = document.getElementById('alertBox');
        alertBox.textContent = message;
        alertBox.className = `alert alert-${type} show`;
        setTimeout(() => alertBox.classList.remove('show'), 5000);
    }
    
    function logout() {
        localStorage.removeItem('github_token');
        localStorage.removeItem('admin_session');
        localStorage.removeItem('admin_session_time');
        window.location.href = 'login.html';
    }
</script>
